name: LogLimiter
version: '1.0.0'
main: loglimiter.LogLimiter
api-version: '1.21'
folia-supported: true
description: Suppresses repeated log spam and periodically prints accumulated counts
authors: [mitality]

commands:
  loglimiter:
    description: Manage the LogLimiter plugin
    usage: /loglimiter reload
    aliases: [ll]

permissions:
  loglimiter.command.reload:
    description: Allows reloading the LogLimiter configuration
    default: op
